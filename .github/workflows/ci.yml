name: CI

# Lints + tests every PR and every push to main. Each service is tested in
# its own working directory because the workspace ships overlapping ``src.*``
# packages (analytics_service vs analytics_worker, etc.) that collide when
# pytest is run from the repo root.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinning uv keeps wheels/cache reproducible. Bump in lockstep with the
  # version developers use locally.
  UV_VERSION: "0.10.7"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace (with dev deps)
        run: uv sync --all-packages --frozen

      - name: ruff check
        run: uv run ruff check .

      # `ruff format --check` is intentionally not wired up yet: the existing
      # codebase has not been formatted with ruff and enabling it would
      # produce a large diff. Add it once the team is ready.

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth_service
          - media_service
          - notifications_service
          - main_service
          - analytics_service
          - analytics_worker
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace (with dev deps)
        run: uv sync --all-packages --frozen

      - name: pytest ${{ matrix.service }}
        # Each service's tests run from its own directory so pytest picks up
        # the per-service pyproject.toml (`pythonpath = ["."]`, asyncio_mode,
        # testpaths) and the right `src` package is on sys.path.
        working-directory: services/${{ matrix.service }}
        run: uv run --package ${{ matrix.service }} pytest -q

  helm:
    name: Helm chart (lint + template)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm lint
        run: helm lint deploy/helm/sports-analytics

      - name: helm template (default values)
        run: helm template sports-analytics deploy/helm/sports-analytics > /tmp/default.yaml

      - name: helm template (external Postgres profile)
        # Make sure the chart still renders when the bundled Postgres is off
        # and the user supplies their own *_DATABASE_URL secrets.
        run: |
          helm template sports-analytics deploy/helm/sports-analytics \
            --set postgres.enabled=false \
            --set secrets.authDatabaseUrl='postgresql+asyncpg://u:p@db/a' \
            --set secrets.mediaDatabaseUrl='postgresql+asyncpg://u:p@db/m' \
            --set secrets.notificationsDatabaseUrl='postgresql+asyncpg://u:p@db/n' \
            --set networkPolicy.enabled=true \
            > /tmp/external.yaml

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Validate manifests against k8s API
        # `-strict` catches unknown fields; `-ignore-missing-schemas` tolerates
        # CRDs not in the public schema bundle (e.g. KEDA's ScaledObject).
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            /tmp/default.yaml /tmp/external.yaml

  build:
    name: Build images (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only smoke-build images on PRs and pushes; publishing to a registry is
    # deliberately out of scope for this workflow.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth_service
          - media_service
          - notifications_service
          - main_service
          - analytics_service
          - analytics_worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: false
          tags: sports-analytics/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
