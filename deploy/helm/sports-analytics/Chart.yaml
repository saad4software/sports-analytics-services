apiVersion: v2
name: sports-analytics
description: |
  Sports analytics microservices: main (BFF), auth, media, notifications,
  analytics-api, and analytics-worker — fronted by an Ingress and backed by
  Postgres (one logical DB per owning service) and Redis. Worker autoscaling
  is driven by KEDA on the Redis queue length.
type: application
version: 0.2.0
appVersion: "0.2.0"
maintainers:
  - name: sports-analytics
keywords:
  - sports
  - analytics
  - yolo
  - fastapi
  - mlops
