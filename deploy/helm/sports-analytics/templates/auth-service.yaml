apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sports-analytics.fullname" . }}-auth-service
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sports-analytics.fullname" . }}-auth-service
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  selector:
    {{- include "sports-analytics.componentSelector" (dict "component" "auth-service" "Release" .Release) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sports-analytics.fullname" . }}-auth-service
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  replicas: {{ .Values.authService.replicas }}
  selector:
    matchLabels:
      {{- include "sports-analytics.componentSelector" (dict "component" "auth-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sports-analytics.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sports-analytics.fullname" . }}-auth-service
      {{- include "sports-analytics.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: auth-service
          image: {{ include "sports-analytics.image" (dict "repository" .Values.authService.image.repository "tag" .Values.authService.image.tag "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: {{ include "sports-analytics.configMapName" . }}
            - secretRef:
                name: {{ include "sports-analytics.secretName" . }}
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
---
{{- if gt (int .Values.authService.replicas) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sports-analytics.fullname" . }}-auth-service
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "sports-analytics.componentSelector" (dict "component" "auth-service" "Release" .Release) | nindent 6 }}
{{- end }}
