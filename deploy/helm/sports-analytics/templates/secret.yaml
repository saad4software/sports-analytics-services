{{- if not .Values.secrets.existingSecret }}
{{- /*
  Compose the per-service Database URLs. When the chart bundles Postgres
  (.Values.postgres.enabled) and the user has not overridden a URL, we
  derive it from the release-scoped Postgres Service so the rendered URL
  always points at the cluster-local instance regardless of release name.
*/ -}}
{{- $pgHost := printf "%s-postgres" (include "sports-analytics.fullname" .) -}}
{{- $pgUser := .Values.postgres.user -}}
{{- $pgPass := .Values.postgres.password -}}
{{- $derive := and .Values.postgres.enabled true -}}
{{- $authUrl := .Values.secrets.authDatabaseUrl -}}
{{- $mediaUrl := .Values.secrets.mediaDatabaseUrl -}}
{{- $notifUrl := .Values.secrets.notificationsDatabaseUrl -}}
{{- if and $derive (not $authUrl) -}}
{{- $authUrl = printf "postgresql+asyncpg://%s:%s@%s:5432/sports_auth" $pgUser $pgPass $pgHost -}}
{{- end -}}
{{- if and $derive (not $mediaUrl) -}}
{{- $mediaUrl = printf "postgresql+asyncpg://%s:%s@%s:5432/sports_media" $pgUser $pgPass $pgHost -}}
{{- end -}}
{{- if and $derive (not $notifUrl) -}}
{{- $notifUrl = printf "postgresql+asyncpg://%s:%s@%s:5432/sports_notifications" $pgUser $pgPass $pgHost -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sports-analytics.secretName" . }}
  labels:
    {{- include "sports-analytics.labels" . | nindent 4 }}
type: Opaque
stringData:
  INTERNAL_API_KEY: {{ .Values.secrets.internalApiKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  # Owning services each read their own *_DATABASE_URL. db_core's settings
  # also accept DATABASE_URL as a fallback, but we render the explicit names
  # here so a service that hits the wrong DB at startup fails loudly.
  AUTH_DATABASE_URL: {{ $authUrl | quote }}
  MEDIA_DATABASE_URL: {{ $mediaUrl | quote }}
  NOTIFICATIONS_DATABASE_URL: {{ $notifUrl | quote }}
{{- end }}
