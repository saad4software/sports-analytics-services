{{- if .Values.postgres.enabled }}
{{- /*
  Bootstrap script projected into the bundled Postgres image at
  /docker-entrypoint-initdb.d/. The official postgres image runs every
  *.sh under that directory on the first init of the data directory only;
  subsequent restarts reuse the existing volume.

  Keep this list aligned with .Values.secrets.*DatabaseUrl above.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sports-analytics.fullname" . }}-postgres-init
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "postgres" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
data:
  10-init-databases.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    create_db() {
      local db="$1"
      echo "Ensuring database '$db' exists"
      psql -v ON_ERROR_STOP=1 \
           --username "${POSTGRES_USER}" \
           --dbname postgres \
           -tc "SELECT 1 FROM pg_database WHERE datname = '${db}'" | grep -q 1 \
        || psql -v ON_ERROR_STOP=1 \
                --username "${POSTGRES_USER}" \
                --dbname postgres \
                -c "CREATE DATABASE \"${db}\""
    }

    {{- range .Values.postgres.databases }}
    create_db {{ . | quote }}
    {{- end }}
{{- end }}
