{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sports-analytics.fullname" . }}-redis
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "redis" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    {{- include "sports-analytics.componentSelector" (dict "component" "redis" "Release" .Release) | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sports-analytics.fullname" . }}-redis
  labels:
    {{- include "sports-analytics.componentLabels" (dict "component" "redis" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  serviceName: {{ include "sports-analytics.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "sports-analytics.componentSelector" (dict "component" "redis" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sports-analytics.componentLabels" (dict "component" "redis" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 8 }}
    spec:
      {{- include "sports-analytics.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 6379
          args:
            - --appendonly
            - "yes"
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storageSize }}
{{- end }}
