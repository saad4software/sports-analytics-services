[project]
name = "db_core"
version = "0.1.0"
description = "Shared DB + service plumbing (SQLModel session, Alembic helpers, middleware, JWT)"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.13",
    "asyncpg>=0.30",
    "fastapi>=0.115",
    "greenlet>=3.0",
    "pyjwt>=2.9",
    "pydantic>=2.8",
    "sqlmodel>=0.0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/db_core"]
